<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <title>Bettin'</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #050505;
        color: #a8a29e;
        font-family: system-ui, sans-serif;
      }
      .wrap {
        display: grid;
        place-content: center;
        height: 100%;
        text-align: center;
        gap: 0.75rem;
      }
      .logo {
        width: 56px;
        height: 56px;
        margin: 0 auto;
        border-radius: 14px;
        background: linear-gradient(135deg, #7c3aed, #2e1065);
        box-shadow: 0 12px 40px rgba(124, 58, 237, 0.35);
      }
      h1 {
        margin: 0;
        font-size: 1.25rem;
        color: #fafaf9;
      }
      p {
        margin: 0;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo" aria-hidden="true"></div>
      <h1>Bettin'</h1>
      <p>Loading your edge…</p>
    </div>
  </body>
</html>
