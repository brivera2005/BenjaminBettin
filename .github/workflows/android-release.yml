name: Android Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'android-v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Android version + Capacitor
        run: npm run mobile:sync

      - name: Build debug APK (signed with debug keystore)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare release asset
        run: cp android/app/build/outputs/apk/debug/app-debug.apk bettin-release.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bettin-release.apk
          name: Bettin' Android ${{ github.ref_name }}
          body: |
            ## Install on your phone
            1. Download **bettin-release.apk** below.
            2. Open it and allow install from that source if Android asks.
            3. Launch **Bettin'** and sign in — your bets sync from the cloud.

            ## In-app updates
            Future shell updates check GitHub Releases automatically. Tap **Install update** in the app when prompted.

            ## Tag format
            Tags like `android-v1.0.0-build2` where `2` matches `versionCode` in `mobile/release.json`.

            ## Web updates vs APK updates
            - **Most features** (UI, bet logging, auto-grade) update instantly via Cloudflare when you run `npm run deploy`.
            - **APK updates** are only needed for native changes (ads SDK, premium billing, Android permissions).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: bettin-release-apk
          path: bettin-release.apk
